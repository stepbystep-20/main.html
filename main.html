<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>용남고등학교 네비게이션</title>
<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #f2f2f2;
  font-family: sans-serif;
}

#app {
  width: 100%;
  min-height: 100vh;
  padding: 24px;
}

/* 제목 */
#title-section {
  width: 100%;
  border: 3px solid black;
  padding: 20px;
  margin-bottom: 40px;
}

#main-title {
  margin: 0;
  text-align: center;
  font-size: 42px;
  color: black;
}

/* 지도 영역 */
#map-section {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  margin-bottom: 50px;
}

.arrow-btn {
  width: 60px;
  height: 100px;
  border: 2px solid black;
  border-radius: 12px;
  background: #d0d0d0;
  font-size: 28px;
  cursor: pointer;
}

.arrow-btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

#map-container {
  position: relative;
  width: 80%;
  height: 520px;
  border: 3px solid black;
  background: white;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 캔버스가 부모 영역(#map-container) 내부를 꽉 채우도록 설정 */
#map-canvas {
  width: 100%;
  height: 100%;
  display: block;
}

/* 우측 상단 층 표시 배지 */
#floor-indicator {
  position: absolute;
  top: 12px;
  right: 16px;
  z-index: 2;
  background: #1c1c1e;
  color: white;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 18px;
  font-weight: bold;
  pointer-events: none;
}

/* 출발 / 도착 */
#route-select {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 80px;
  margin-bottom: 50px;
}

.route-box {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.route-title {
  width: 240px;
  height: 50px;
  border: 2px solid black;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  background: white;
  margin-bottom: -2px;
}

/* 드롭다운 select 태그 스타일링 */
select.route-content {
  width: 240px;
  height: 60px;
  border: 2px solid black;
  background: white;
  font-size: 24px;
  font-weight: bold;
  text-align: center;
  text-align-last: center;
  cursor: pointer;
  outline: none;
  transition: background 0.2s;
}

select.route-content:hover {
  background: #f9f9f9;
}

#swap-btn {
  font-size: 42px;
  color: black;
  cursor: pointer;
  user-select: none;
}

/* 주요 경로 */
#main-route {
  width: 100%;
  border: 3px solid black;
  min-height: 220px;
  padding: 40px;
  background: white;
}

#main-route-title {
  font-size: 42px;
  color: black;
  margin-bottom: 40px;
}

#main-route-line {
  width: 100%;
  height: 4px;
  background: black;
  margin-bottom: 20px;
}

/* 자바스크립트로 출력될 최종 추천 경로 텍스트 스타일 */
.route-text-result {
  font-size: 22px;
  font-weight: bold;
  color: #1a1a1a;
  line-height: 1.6;
  margin-top: 20px;
}

.route-floor-segment {
  margin: 10px 0;
}

.route-transition {
  margin: 6px 0 6px 12px;
  font-size: 17px;
  color: #ff3b30;
}

</style>
</head>
<body>

  <div id="app">

    <header id="title-section">
      <h1 id="main-title">용남고등학교 네비게이션</h1>
    </header>

    <section id="map-section">
      <button id="prev-floor-btn" class="arrow-btn">◀</button>
      <div id="map-container">
        <div id="floor-indicator">
          <span id="floor-label">1층</span>
        </div>
        <canvas id="map-canvas"></canvas>
      </div>
      <button id="next-floor-btn" class="arrow-btn">▶</button>
    </section>

    <section id="route-select">
      <div class="route-box">
        <div class="route-title">출발지점 선택</div>
        <select id="start-select" class="route-content">
          <option value="">-- 선택 --</option>
        </select>
      </div>

      <div id="swap-btn">⇄</div>

      <div class="route-box">
        <div class="route-title">도착지점 선택</div>
        <select id="end-select" class="route-content">
          <option value="">-- 선택 --</option>
        </select>
      </div>
    </section>

    <section id="main-route">
      <div id="main-route-title">주요 경로</div>
      <div id="main-route-line"></div>
    </section>

  </div>

// ============================================================
// 2) 다익스트라 알고리즘 (dijkstra.js)
// ============================================================
/**
 * 용남고등학교 다층(1~4층) 네비게이션 그래프에 대한 다익스트라 최단경로 알고리즘
 *
 * NAV_DATA 구조:
 * {
 *   floors: {
 *     "1": { nodes: [{id, name, type, x, y}], edges: [{from, to, distance}] },
 *     "2": { ... }, "3": { ... }, "4": { ... }
 *   },
 *   crossEdges: [{from, to, fromFloor, toFloor, distance}]  // 계단/엘리베이터로 층간 이동하는 간선
 * }
 *
 * 모든 노드 id는 층 접두어(1st_, 2nd_, 3rd_, 4th_)가 붙어 전체 그래프에서 유일하므로,
 * 층별 edges + crossEdges를 합쳐 하나의 무방향 그래프로 다루면 된다.
 */

// NAV_DATA를 기반으로 { nodeId: {node, floor} } 맵과 인접 리스트(adjacency list)를 만든다
function buildGraph(navData) {
    const nodeInfo = {};   // nodeId -> { id, name, type, x, y, floor }
    const adjacency = {};  // nodeId -> [{ target, distance }]

    Object.keys(navData.floors).forEach(floorKey => {
        const floorNum = Number(floorKey);
        navData.floors[floorKey].nodes.forEach(node => {
            nodeInfo[node.id] = { ...node, floor: floorNum };
            adjacency[node.id] = [];
        });
    });

    function addEdge(a, b, distance) {
        if (!adjacency[a] || !adjacency[b]) return; // 존재하지 않는 노드를 참조하는 간선은 무시
        adjacency[a].push({ target: b, distance });
        adjacency[b].push({ target: a, distance });
    }

    Object.keys(navData.floors).forEach(floorKey => {
        navData.floors[floorKey].edges.forEach(edge => {
            addEdge(edge.from, edge.to, edge.distance);
        });
    });

    navData.crossEdges.forEach(edge => {
        addEdge(edge.from, edge.to, edge.distance);
    });

    return { nodeInfo, adjacency };
}

/**
 * 다익스트라 최단경로 탐색
 * @param {string} startId 출발 노드 id
 * @param {string} endId 도착 노드 id
 * @param {Object} navData NAV_DATA
 * @returns {Object|null} { path: [노드id 배열], totalCost: 총거리, nodeInfo: {id: 노드정보} }
 */
function findShortestPathDijkstra(startId, endId, navData) {
    const { nodeInfo, adjacency } = buildGraph(navData);

    if (!nodeInfo[startId] || !nodeInfo[endId]) return null;

    const dist = {};       // 출발지로부터의 확정/잠정 최단 거리
    const prev = {};       // 경로 역추적용 이전 노드
    const visited = new Set();

    Object.keys(nodeInfo).forEach(id => { dist[id] = Infinity; });
    dist[startId] = 0;

    // 노드 수가 많지 않으므로(약 100여개) 우선순위 큐 없이 선형 탐색으로 최소값을 찾는다
    while (true) {
        let currentId = null;
        let currentMin = Infinity;
        for (const id of Object.keys(nodeInfo)) {
            if (!visited.has(id) && dist[id] < currentMin) {
                currentMin = dist[id];
                currentId = id;
            }
        }

        // 더 이상 방문할 노드가 없거나(그래프 단절), 남은 최소 거리가 무한대면 종료
        if (currentId === null) break;

        if (currentId === endId) break; // 목적지 확정 시 조기 종료

        visited.add(currentId);

        const neighbors = adjacency[currentId] || [];
        for (const { target, distance } of neighbors) {
            if (visited.has(target)) continue;
            const candidate = dist[currentId] + distance;
            if (candidate < dist[target]) {
                dist[target] = candidate;
                prev[target] = currentId;
            }
        }
    }

    if (dist[endId] === Infinity) return null; // 경로 없음

    // 경로 역추적
    const path = [];
    let temp = endId;
    while (temp !== undefined) {
        path.unshift(temp);
        if (temp === startId) break;
        temp = prev[temp];
    }

    if (path[0] !== startId) return null; // 역추적 실패(비정상 상황) 방어 코드

    return {
        path,
        totalCost: dist[endId],
        nodeInfo
    };
}

if (typeof module !== 'undefined' && module.exports) {
    module.exports = { findShortestPathDijkstra, buildGraph };
}

        const temp = startNodeId;
        startNodeId = endNodeId;
        endNodeId = temp;

        startSelect.value = startNodeId || "";
        endSelect.value = endNodeId || "";

        if (startNodeId) currentFloor = NAV_DATA_getFloorOf(startNodeId);
        calculateAndDraw();
    });

    prevBtn.addEventListener('click', () => changeFloor(-1));
    nextBtn.addEventListener('click', () => changeFloor(1));

    updateFloorLabel();
}

// 층별로 optgroup을 나누어 드롭다운을 채운다. value는 노드 id, 화면 표시는 노드 이름(중복 시 번호 부여)
function populateSelect(selectEl) {
    Object.keys(NAV_DATA.floors)
        .sort((a, b) => Number(a) - Number(b))
        .forEach(floorKey => {
            const nodes = NAV_DATA.floors[floorKey].nodes.filter(n => !EXCLUDED_SELECT_TYPES.has(n.type));
            if (nodes.length === 0) return;

            const optgroup = document.createElement('optgroup');
            optgroup.label = `${floorKey}층`;

            const nameCount = {};
            nodes.forEach(n => { nameCount[n.name] = (nameCount[n.name] || 0) + 1; });
            const nameSeen = {};

            nodes.forEach(node => {
                const option = document.createElement('option');
                option.value = node.id;

                let label = node.name;
                if (nameCount[node.name] > 1) {
                    nameSeen[node.name] = (nameSeen[node.name] || 0) + 1;
                    label = `${node.name} (${nameSeen[node.name]})`;
                }
                option.textContent = label;
                optgroup.appendChild(option);
            });

            selectEl.appendChild(optgroup);
        });
}

function NAV_DATA_getFloorOf(nodeId) {
    for (const floorKey of Object.keys(NAV_DATA.floors)) {
        if (NAV_DATA.floors[floorKey].nodes.some(n => n.id === nodeId)) return Number(floorKey);
    }
    return currentFloor;
}

function initCanvas() {
    canvas = document.getElementById('map-canvas');
    ctx = canvas.getContext('2d');

    resizeCanvas();
    drawFloor();

    window.addEventListener('resize', () => {
        resizeCanvas();
        drawFloor();
    });
}

function resizeCanvas() {
    const container = document.getElementById('map-container');
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;
}

// ---------------------------------------------------------------------
// 층 전환
// ---------------------------------------------------------------------

function changeFloor(delta) {
    const next = currentFloor + delta;
    if (next < MIN_FLOOR || next > MAX_FLOOR) return;
    currentFloor = next;
    updateFloorLabel();
    drawFloor(lastPathResult);
}

function updateFloorLabel() {
    const label = document.getElementById('floor-label');
    if (label) label.textContent = `${currentFloor}층`;

    const prevBtn = document.getElementById('prev-floor-btn');
    const nextBtn = document.getElementById('next-floor-btn');
    if (prevBtn) prevBtn.disabled = currentFloor <= MIN_FLOOR;
    if (nextBtn) nextBtn.disabled = currentFloor >= MAX_FLOOR;
}

// ---------------------------------------------------------------------
// 경로 계산
// ---------------------------------------------------------------------

function calculateAndDraw() {
    if (startNodeId && endNodeId && startNodeId !== endNodeId) {
        const result = findShortestPathDijkstra(startNodeId, endNodeId, NAV_DATA);
        if (result) {
            lastPathResult = result;
            currentFloor = result.nodeInfo[startNodeId].floor;
            updateFloorLabel();
            drawFloor(result);
            updateRouteText(result);
        } else {
            alert('연결된 경로를 찾을 수 없습니다.');
            lastPathResult = null;
            drawFloor();
            clearRouteText();
        }
    } else {
        lastPathResult = null;
        drawFloor();
        clearRouteText();
    }
}

// ---------------------------------------------------------------------
// 캔버스 렌더링 (현재 층만 그림)
// ---------------------------------------------------------------------

function getFloorBounds(nodes) {
    const xs = nodes.map(n => n.x);
    const ys = nodes.map(n => n.y);
    return {
        minX: Math.min(...xs), maxX: Math.max(...xs),
        minY: Math.min(...ys), maxY: Math.max(...ys)
    };
}

function makeCoordMapper(nodes) {
    const bounds = getFloorBounds(nodes);
    const spanX = Math.max(bounds.maxX - bounds.minX, 1);
    const spanY = Math.max(bounds.maxY - bounds.minY, 1);

    const availW = canvas.width - padding * 2;
    const availH = canvas.height - padding * 2;
    const scale = Math.min(availW / spanX, availH / spanY);

    const offsetX = padding + (availW - spanX * scale) / 2;
    const offsetY = padding + (availH - spanY * scale) / 2;

    return (node) => ({
        x: offsetX + (node.x - bounds.minX) * scale,
        y: offsetY + (node.y - bounds.minY) * scale
    });
}

function drawFloor(pathResult = lastPathResult) {
    if (!canvas || !ctx) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const floorData = NAV_DATA.floors[String(currentFloor)];
    if (!floorData) return;

    const nodes = floorData.nodes;
    const nodeById = {};
    nodes.forEach(n => { nodeById[n.id] = n; });
    const toCanvas = makeCoordMapper(nodes);

    // 이 층에서 경로가 지나가는 노드 id 집합 및 연속 구간(같은 층에서 실제로 이어지는 구간) 계산
    const pathNodeIdsOnFloor = new Set();
    const highlightSegments = []; // [{a: coords, b: coords}]
    if (pathResult) {
        const path = pathResult.path;
        for (let i = 0; i < path.length; i++) {
            if (pathResult.nodeInfo[path[i]].floor === currentFloor) {
                pathNodeIdsOnFloor.add(path[i]);
            }
        }
        for (let i = 0; i < path.length - 1; i++) {
            const a = path[i], b = path[i + 1];
            const infoA = pathResult.nodeInfo[a], infoB = pathResult.nodeInfo[b];
            if (infoA.floor === currentFloor && infoB.floor === currentFloor) {
                highlightSegments.push({ a: nodeById[a], b: nodeById[b] });
            }
        }
    }

    // 1) 층 라벨
    ctx.fillStyle = '#c7c7cc';
    ctx.font = 'bold 20px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`${currentFloor}층 (개략도 · 실측 배경 없음)`, 12, 26);

    // 2) 전체 간선(연결선)
    ctx.lineWidth = 2;
    ctx.strokeStyle = 'rgba(0, 0, 0, 0.15)';
    floorData.edges.forEach(edge => {
        const fromNode = nodeById[edge.from];
        const toNode = nodeById[edge.to];
        if (!fromNode || !toNode) return;
        const p1 = toCanvas(fromNode);
        const p2 = toCanvas(toNode);
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
    });

    // 3) 최단 경로 하이라이트 (이 층 내에서 실제로 이어지는 구간만)
    ctx.lineWidth = 6;
    ctx.strokeStyle = '#ff3b30';
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    highlightSegments.forEach(seg => {
        const p1 = toCanvas(seg.a);
        const p2 = toCanvas(seg.b);
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
    });

    // 4) 노드 점 및 텍스트
    nodes.forEach(node => {
        const coords = toCanvas(node);
        const isStart = node.id === startNodeId;
        const isEnd = node.id === endNodeId;
        const onPath = pathNodeIdsOnFloor.has(node.id);

        let radius = 6;
        if (onPath) radius = 9;

        ctx.beginPath();
        ctx.arc(coords.x, coords.y, radius, 0, 2 * Math.PI);

        if (isStart) {
            ctx.fillStyle = '#007aff';
        } else if (isEnd) {
            ctx.fillStyle = '#34c759';
        } else if (onPath) {
            ctx.fillStyle = '#ff3b30';
        } else {
            ctx.fillStyle = TYPE_COLOR[node.type] || TYPE_COLOR.default;
        }

        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#ffffff';
        ctx.stroke();

        // 경로가 이 노드에서 다른 층으로 넘어가는 지점이면 화살표 표시
        if (pathResult && onPath) {
            const marker = getFloorTransitionMarker(pathResult, node.id);
            if (marker) {
                ctx.fillStyle = '#ff3b30';
                ctx.font = 'bold 16px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(marker, coords.x, coords.y - (radius + 20));
            }
        }

        if (isStart || isEnd || onPath) {
            ctx.fillStyle = '#1c1c1e';
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(node.name, coords.x, coords.y - (radius + 6));
        }
    });
}

// 경로 상에서 node가 층 이동 지점이면 "▲2층" / "▼1층" 같은 표시를 반환
function getFloorTransitionMarker(pathResult, nodeId) {
    const path = pathResult.path;
    const idx = path.indexOf(nodeId);
    if (idx === -1) return null;

    const myFloor = pathResult.nodeInfo[nodeId].floor;
    const prevFloor = idx > 0 ? pathResult.nodeInfo[path[idx - 1]].floor : myFloor;
    const nextFloor = idx < path.length - 1 ? pathResult.nodeInfo[path[idx + 1]].floor : myFloor;

    if (nextFloor !== myFloor) {
        return nextFloor > myFloor ? `▲ ${nextFloor}층으로` : `▼ ${nextFloor}층으로`;
    }
    if (prevFloor !== myFloor) {
        return prevFloor > myFloor ? `${prevFloor}층에서 ▼` : `${prevFloor}층에서 ▲`;
    }
    return null;
}

// ---------------------------------------------------------------------
// 하단 경로 텍스트
// ---------------------------------------------------------------------

function updateRouteText(result) {
    clearRouteText();

    const routeContainer = document.getElementById('main-route');
    const textDiv = document.createElement('div');
    textDiv.id = 'dynamic-route-text';
    textDiv.className = 'route-text-result';

    const segments = splitPathByFloor(result);

    let html = `🧭 추천 경로 (총 이동 거리: ${result.totalCost.toFixed(1)})<br><br>`;

    segments.forEach((seg, idx) => {
        const names = seg.nodeIds.map(id => result.nodeInfo[id].name).join(' ➔ ');
        html += `<div class="route-floor-segment"><strong>[${seg.floor}층]</strong> ${names}</div>`;

        if (idx < segments.length - 1) {
            const nextSeg = segments[idx + 1];
            const transitionNodeType = result.nodeInfo[seg.nodeIds[seg.nodeIds.length - 1]].type;
            const via = transitionNodeType === 'elevator' ? '엘리베이터' : '계단';
            const dir = nextSeg.floor > seg.floor ? '▲ 위로' : '▼ 아래로';
            html += `<div class="route-transition">${dir} · ${withParticle(via, '로')} ${nextSeg.floor}층 이동</div>`;
        }
    });

    textDiv.innerHTML = html;
    routeContainer.appendChild(textDiv);
}

// path를 층이 바뀌는 지점 기준으로 구간 분할
function splitPathByFloor(result) {
    const segments = [];
    let current = null;

    result.path.forEach(nodeId => {
        const floor = result.nodeInfo[nodeId].floor;
        if (!current || current.floor !== floor) {
            current = { floor, nodeIds: [] };
            segments.push(current);
        }
        current.nodeIds.push(nodeId);
    });

    return segments;
}

// 한글 단어 마지막 글자의 받침 유무에 따라 '로'/'으로' 조사를 올바르게 붙여준다
function withParticle(word, particle) {
    if (particle !== '로') return word + particle; // 이 앱에서는 '로' 조사만 사용
    const lastChar = word.charCodeAt(word.length - 1);
    const isHangul = lastChar >= 0xAC00 && lastChar <= 0xD7A3;
    if (!isHangul) return word + particle;
    const jong = (lastChar - 0xAC00) % 28; // 0이면 받침 없음
    if (jong === 0 || jong === 8) return word + '로';   // 받침 없음 또는 ㄹ받침은 '로'
    return word + '으로';
}

function clearRouteText() {
    const oldText = document.getElementById('dynamic-route-text');
    if (oldText) oldText.remove();
}

</script>
